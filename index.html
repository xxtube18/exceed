<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NVO - Dashboard de Desempenho</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #05162d 0%, #000814 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: space-between;
            align-items: center;
            overflow-x: hidden;
        }

        /* Estilo dos Jogadores */
        .side-player {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
            transition: all 0.5s ease;
        }

        .side-player img {
            height: 70vh;
            max-width: 100%;
            object-fit: contain;
            z-index: 1;
            filter: drop-shadow(0 0 15px rgba(0, 119, 255, 0.3));
            border-bottom: 3px solid #0077b6;
            transition: all 0.4s ease;
        }

        .side-player:hover img {
            transform: scale(1.05);
            filter: drop-shadow(0 0 25px rgba(0, 180, 216, 0.6));
            border-bottom-color: #00f2ff;
        }

        .player-name {
            margin-top: -25px;
            background: linear-gradient(135deg, #0077b6, #00b4d8);
            color: white;
            padding: 8px 25px;
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 2;
            border-radius: 2px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* Centro */
        .center-content {
            flex: 1.2;
            text-align: center;
            padding: 0 20px;
            z-index: 10;
        }

        .center-content h1 {
            font-size: 3rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: linear-gradient(to bottom, #ffffff, #90e0ef);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .center-content p {
            color: #a8dadc;
            margin-bottom: 35px;
            font-size: 1rem;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Botão */
        .btn-acesso {
            display: inline-block;
            background: transparent;
            color: #00f2ff;
            text-decoration: none;
            padding: 15px 45px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            border: 2px solid #00f2ff;
            border-radius: 4px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.1);
        }

        .btn-acesso:hover {
            background: #00f2ff;
            color: #000;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.4);
            transform: translateY(-2px);
        }

        @media (max-width: 1024px) {
            body { flex-direction: column; height: auto; }
            .side-player { height: 50vh; width: 100%; margin: 20px 0; }
            .side-player img { height: 40vh; }
            .center-content { order: -1; padding: 50px 20px; }
        }
    </style>
</head>
<body>

    <!-- Lado Esquerdo: GOABE -->
    <div class="side-player">
        <img src="NVO%20GOABE7.png" alt="NVO GOABE" onerror="this.src='NVO GOABE7.png'">
        <div class="player-name">NVO GOABE</div>
    </div>

    <!-- Centro -->
    <div class="center-content">
        <h1>Dashboard</h1>
        <p>Monitoramento de performance e métricas em tempo real para a equipe NVO.</p>
        <a href="https://xxtube18.github.io/sx-dados-V2/jogadores.html" class="btn-acesso">Acessar Sistema</a>
    </div>

    <!-- Lado Direito: GUIFOX -->
    <div class="side-player">
        <!-- O código abaixo tenta as duas formas comuns de ler o espaço que você informou -->
        <img src="NVO%20GUIFOX%20.png" alt="NVO GUIFOX" onerror="this.src='NVO GUIFOX .png'">
        <div class="player-name">NVO GUIFOX</div>
    </div>

</body>
</html>
