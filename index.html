<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso - Dashboard Profissional</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            /* Gradiente de fundo com tons de azul profundo */
            background: linear-gradient(135deg, #050a14 0%, #0a192f 50%, #0d1117 100%);
            color: #e6f1ff;
            min-height: 100vh;
            display: flex;
            justify-content: space-between;
            align-items: center;
            overflow-x: hidden;
        }

        /* Container dos Jogadores */
        .side-player {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
            transition: all 0.5s ease;
        }

        /* Brilho suave atrás do jogador em azul claro */
        .side-player::before {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(100, 255, 218, 0.07) 0%, rgba(0,0,0,0) 70%);
            z-index: 0;
        }

        .side-player img {
            height: 75vh;
            max-width: 100%;
            object-fit: contain;
            z-index: 1;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.8)) saturate(80%);
            border-bottom: 4px solid #112240;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Efeito ao passar o mouse */
        .side-player:hover img {
            filter: saturate(110%) drop-shadow(0 0 20px rgba(0, 119, 255, 0.4));
            transform: scale(1.02);
            border-bottom-color: #64ffda; /* Azul esverdeado/Cyan para destaque */
        }

        .player-name {
            margin-top: -30px;
            background: linear-gradient(90deg, #112240, #1d3557);
            color: #64ffda;
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            z-index: 2;
            border-radius: 4px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(100, 255, 218, 0.2);
        }

        /* Conteúdo Central */
        .center-content {
            flex: 1.5;
            text-align: center;
            padding: 0 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .center-content h1 {
            font-size: clamp(2rem, 4.5vw, 3rem);
            background: linear-gradient(to bottom, #ffffff 0%, #a8b2d1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 20px;
            line-height: 1.1;
        }

        .center-content p {
            font-size: 1rem;
            line-height: 1.8;
            color: #8892b0;
            margin-bottom: 40px;
            max-width: 450px;
        }

        /* Botão Estilizado em tons de azul */
        .btn-acesso {
            background-color: transparent;
            color: #64ffda;
            text-decoration: none;
            padding: 18px 50px;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            border: 2px solid #64ffda;
            border-radius: 4px;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-acesso:hover {
            background-color: rgba(100, 255, 218, 0.1);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(100, 255, 218, 0.15);
        }

        /* Responsividade */
        @media (max-width: 1024px) {
            body {
                flex-direction: column;
                height: auto;
                overflow-y: auto;
                background: #0a192f;
            }

            .side-player {
                height: 50vh;
                width: 100%;
                margin: 40px 0;
            }

            .side-player img {
                height: 40vh;
            }

            .center-content {
                order: -1;
                padding: 80px 20px 40px;
            }
            
            .player-name {
                margin-top: -20px;
            }
        }
    </style>
</head>
<body>

    <!-- Lado Esquerdo: NVO GOABE -->
    <div class="side-player">
        <img src="NVO GOABE.png" alt="Jogador NVO GOABE">
        <div class="player-name">NVO GOABE</div>
    </div>

    <!-- Centro: Dashboard -->
    <div class="center-content">
        <h1>Dashboard de Desempenho</h1>
        <p>
            Análise tática avançada e métricas de alta performance. 
            Acesse o ecossistema de dados para monitoramento em tempo real.
        </p>
        
        <a href="https://xxtube18.github.io/sx-dados-V2/jogadores.html" class="btn-acesso">Entrar no Sistema</a>
    </div>

    <!-- Lado Direito: NVO GUIFOX -->
    <div class="side-player">
        <img src="NVO GUIFOX.png" alt="Jogador NVO GUIFOX">
        <div class="player-name">NVO GUIFOX</div>
    </div>

</body>
</html>
