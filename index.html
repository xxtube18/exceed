<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lineup Coach Lipee</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .team-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            max-width: 1200px;
        }

        .player-card {
            width: 300px;
            background: #111;
            border-bottom: 4px solid #fff; /* Detalhe inferior branco */
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8);
            text-align: center;
        }

        .photo-wrapper {
            width: 100%;
            height: 320px;
            background: #222; /* Cor de fundo caso a imagem falhe */
        }

        .player-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%); /* Mantém o padrão P&B */
            display: block;
        }

        .player-info {
            padding: 20px;
        }

        .player-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            margin-bottom: 15px;
        }

        /* Botão do Link que você pediu */
        .btn-link {
            display: inline-block;
            padding: 10px 20px;
            background-color: #fff;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 4px;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .btn-link:hover {
            background-color: #ccc;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="team-container">
        <!-- CARD 01 (Substituiu Noda) -->
        <div class="player-card">
            <div class="photo-wrapper">
                <!-- AJUSTE AQUI: Se a foto for do PC, deixe dnrlq.png. Se for da web, cole o link no lugar -->
                <img src="dnrlq.png" alt="DNrlq" class="player-photo">
            </div>
            <div class="player-info">
                <h2 class="player-name">DNrlq</h2>
                <a href="LINK_AQUI" class="btn-link">Ver Perfil</a>
            </div>
        </div>

        <!-- CARD 02 (Substituiu Vitin9) -->
        <div class="player-card">
            <div class="photo-wrapper">
                <img src="dnrlq.png" alt="DNrlq" class="player-photo">
            </div>
            <div class="player-info">
                <h2 class="player-name">DNrlq</h2>
                <a href="LINK_AQUI" class="btn-link">Ver Perfil</a>
            </div>
        </div>
    </div>

</body>
</html>
