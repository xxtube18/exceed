<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Ordem | Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        body {
            background-color: #020617;
            color: #f8fafc;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        /* Background Dinâmico */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(125deg, #020617 0%, #0f172a 50%, #1e293b 100%);
            z-index: -2;
        }

        /* Logo em marca d'água no fundo (Direita) */
        .bg-logo-watermark {
            position: absolute;
            right: -5%;
            top: 50%;
            transform: translateY(-50%);
            width: 50vw;
            opacity: 0.1;
            filter: grayscale(1) brightness(2);
            z-index: -1;
            pointer-events: none;
        }

        .main-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1.2fr 1fr; /* Layout Assimétrico */
            align-items: center;
            padding: 0 5%;
        }

        /* Coluna da Esquerda: Textos */
        .content-box {
            z-index: 10;
        }

        .team-tag {
            color: #38bdf8;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
            display: block;
        }

        h1 {
            font-size: clamp(3rem, 8vw, 6rem);
            line-height: 0.9;
            text-transform: uppercase;
            font-weight: 900;
            margin-bottom: 20px;
            text-shadow: 10px 10px 0px rgba(56, 189, 248, 0.1);
        }

        p {
            font-size: 1.2rem;
            color: #94a3b8;
            max-width: 500px;
            margin-bottom: 40px;
            border-left: 4px solid #38bdf8;
            padding-left: 20px;
        }

        .btn-modern {
            display: inline-block;
            background: #38bdf8;
            color: #020617;
            padding: 20px 60px;
            font-weight: 900;
            text-transform: uppercase;
            text-decoration: none;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%); /* Corte trapézio */
            transition: all 0.3s ease;
        }

        .btn-modern:hover {
            transform: scale(1.05) skewX(-5deg);
            background: #ffffff;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.4);
        }

        /* Coluna da Direita: Imagem Personagem */
        .visual-box {
            position: relative;
            display: flex;
            justify-content: flex-end;
        }

        .player-hero {
            height: 90vh;
            object-fit: contain;
            filter: drop-shadow(-20px 20px 50px rgba(0,0,0,0.9));
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
        }

        .floating-card {
            position: absolute;
            bottom: 20%;
            right: 10%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 20px;
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 2px;
        }

        .floating-card span {
            display: block;
            font-size: 0.8rem;
            color: #38bdf8;
        }

        .floating-card strong {
            font-size: 1.5rem;
            text-transform: uppercase;
        }

        /* Responsividade */
        @media (max-width: 1024px) {
            .main-container { grid-template-columns: 1fr; text-align: center; }
            .visual-box { display: none; }
            .content-box { display: flex; flex-direction: column; align-items: center; }
            p { border-left: none; padding-left: 0; }
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>
    
    <!-- Logo de fundo -->
    <img src="NVO-SYMBOL-PNG%20(3)%20(1).jpg" class="bg-logo-watermark" alt="">

    <main class="main-container">
        
        <div class="content-box">
            <span class="team-tag">Nova Ordem Oficial</span>
            <h1>DASH<br>BOARD</h1>
            <p>Estatísticas avançadas e análise tática de alto desempenho para competições de elite.</p>
            
            <a href="https://xxtube18.github.io/sx-dados-V2/jogadores.html" class="btn-modern">Entrar no App</a>
        </div>

        <div class="visual-box">
            <img src="NVO%20GOABE7.png" alt="GOABE NVO" class="player-hero">
            
            <div class="floating-card">
                <span>MVP Status</span>
                <strong>NVO GOABE</strong>
            </div>
        </div>

    </main>

</body>
</html>
