<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Ordem - Dashboard de Desempenho</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            /* Fundo com degradê azul marinho profundo */
            background: radial-gradient(circle at center, #0a192f 0%, #020c1b 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: space-around;
            align-items: center;
            overflow: hidden;
        }

        /* Seções Laterais */
        .side-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
        }

        /* Foto do Jogador */
        .player-img {
            height: 75vh;
            max-width: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(0, 180, 216, 0.3));
            border-bottom: 4px solid #00b4d8;
            transition: transform 0.4s ease;
        }

        .player-img:hover {
            transform: scale(1.02);
            filter: drop-shadow(0 0 30px rgba(0, 180, 216, 0.5));
        }

        /* Logo do Time */
        .team-logo {
            width: 80%;
            max-width: 400px;
            filter: drop-shadow(0 0 25px rgba(0, 180, 216, 0.6));
            animation: pulse 4s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        /* Nome do Jogador / Time */
        .label-tag {
            margin-top: -30px;
            background: #0077b6;
            color: #fff;
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-radius: 4px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            border: 1px solid #90e0ef;
            z-index: 5;
        }

        /* Conteúdo Central */
        .center-panel {
            flex: 1.2;
            text-align: center;
            padding: 40px;
            background: rgba(16, 35, 66, 0.6);
            border: 1px solid rgba(0, 180, 216, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            margin: 0 20px;
            z-index: 10;
        }

        .center-panel h1 {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #ffffff, #00b4d8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .center-panel h2 {
            font-size: 1.2rem;
            color: #90e0ef;
            margin-bottom: 30px;
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        /* Botão */
        .btn-acesso {
            display: inline-block;
            background: #00b4d8;
            color: #020c1b;
            text-decoration: none;
            padding: 20px 50px;
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            border-radius: 5px;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 180, 216, 0.3);
        }

        .btn-acesso:hover {
            background: #ffffff;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 180, 216, 0.6);
        }

        /* Responsividade */
        @media (max-width: 1024px) {
            body { flex-direction: column; overflow-y: auto; }
            .side-content { height: auto; padding: 40px 0; }
            .player-img { height: 50vh; }
            .center-panel { order: -1; margin: 40px 20px; }
        }
    </style>
</head>
<body>

    <!-- Lado Esquerdo: Jogador GOABE -->
    <div class="side-content">
        <img src="NVO%20GOABE7.png" alt="NVO GOABE" class="player-img">
        <div class="label-tag">NVO GOABE</div>
    </div>

    <!-- Centro: Informações -->
    <div class="center-panel">
        <h2>Equipe</h2>
        <h1>Nova Ordem</h1>
        <p style="color: #a8b2d1; margin-bottom: 40px;">Sistema oficial de monitoramento tático e análise de dados de alto rendimento.</p>
        <a href="https://xxtube18.github.io/sx-dados-V2/jogadores.html" class="btn-acesso">Acessar Painel</a>
    </div>

    <!-- Lado Direito: Logo do Time -->
    <div class="side-content">
        <img src="https://inline-images.generativeai.googleusercontent.com/images-proxy/AL9v_mqVj7L_uD7j3t4H47P-v1Dk0y1r0hZ9xN1n_6E" alt="Logo Nova Ordem" class="team-logo">
        <div class="label-tag">Oficial</div>
    </div>

</body>
</html>
