<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Player Card - DNrlq</title>
    <style>
        /* Configurações Gerais e Cores */
        :root {
            --preto-fundo: #000000;
            --preto-card: #121212;
            --branco-puro: #FFFFFF;
            --cinza-detalhe: #333333;
        }

        body {
            background-color: var(--preto-fundo);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
        }

        .container {
            display: flex;
            gap: 20px;
        }

        /* Estrutura do Card */
        .player-card {
            width: 250px;
            background-color: var(--preto-card);
            border: 2px solid var(--branco-puro);
            border-radius: 10px;
            overflow: hidden;
            text-align: center;
            transition: transform 0.3s;
        }

        .player-card:hover {
            transform: scale(1.05);
            border-color: #888; /* Leve destaque no hover */
        }

        /* Foto do Player com Filtro P&B */
        .photo-container {
            width: 100%;
            height: 300px;
            background-color: var(--cinza-detalhe);
            overflow: hidden;
        }

        .player-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Aplica o efeito Preto e Branco na foto */
            filter: grayscale(100%) contrast(1.1);
        }

        /* Nome e Informações */
        .info {
            padding: 15px;
            background-color: var(--branco-puro); /* Inversão para contraste */
            color: var(--preto-fundo);
        }

        .name {
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            margin: 0;
        }

        .role {
            font-size: 0.8rem;
            letter-spacing: 2px;
            margin-top: 5px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Substituindo Noda pelo DNrlq -->
        <div class="player-card">
            <div class="photo-container">
                <img src="dnrlq.png" alt="DNrlq" class="player-photo">
            </div>
            <div class="info">
                <p class="name">DNrlq</p>
                <p class="role">PLAYER 01</p>
            </div>
        </div>

        <!-- Substituindo Vitin9 pelo DNrlq -->
        <div class="player-card">
            <div class="photo-container">
                <img src="dnrlq.png" alt="DNrlq" class="player-photo">
            </div>
            <div class="info">
                <p class="name">DNrlq</p>
                <p class="role">PLAYER 02</p>
            </div>
        </div>
    </div>

</body>
</html>
